<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning de la semaine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #F0F4F1; min-height: 100vh;
    padding: 20px 12px 40px; color: #2C3E35;
  }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 1.5rem; font-weight: 700; color: #2C3E35; letter-spacing: -0.5px; }
  header p { font-size: 0.85rem; color: #6B8070; margin-top: 4px; }

  .author-section {
    max-width: 540px; margin: 0 auto 20px; background: white;
    border-radius: 14px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .author-label { font-size: 0.85rem; font-weight: 600; color: #6B8070; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .author-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .author-btn {
    padding: 8px 18px; border-radius: 22px; border: 2px solid #D0DDD5;
    background: white; color: #4A6055; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .author-btn:hover { border-color: #3D5A80; color: #3D5A80; }
  .author-btn.selected { background: #3D5A80; border-color: #3D5A80; color: white; }

  .week-nav { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 22px; }
  .week-nav button {
    background: #3D5A80; color: white; border: none; border-radius: 8px;
    width: 36px; height: 36px; font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .week-label { font-size: 0.95rem; font-weight: 600; color: #3D5A80; min-width: 200px; text-align: center; }

  .progress-label { text-align: center; font-size: 0.75rem; color: #6B8070; margin-bottom: 8px; }
  .progress-bar {
    background: #E8F0EA; border-radius: 6px; height: 6px;
    margin-bottom: 16px; overflow: hidden; max-width: 540px; margin-left: auto; margin-right: auto;
  }
  .progress-fill { background: #7AAB8A; height: 100%; border-radius: 6px; transition: width 0.3s; }

  .days-grid { display: flex; flex-direction: column; gap: 10px; max-width: 540px; margin: 0 auto; }
  .day-card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .day-header {
    background: #3D5A80; color: white; padding: 8px 14px;
    font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
  }
  .day-date { font-size: 0.75rem; opacity: 0.75; font-weight: 400; }
  .meals { padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
  .meal-row { display: flex; flex-direction: column; gap: 6px; }
  .meal-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6B8070; }
  .divider { height: 1px; background: #EDF2EE; margin: 2px 0; }

  .location-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .loc-btn {
    padding: 6px 14px; border-radius: 20px; border: 2px solid #D0DDD5;
    background: white; color: #4A6055; font-size: 0.82rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .loc-btn:hover { border-color: #3D5A80; color: #3D5A80; }
  .loc-btn.sel-maison  { background: #7AAB8A; border-color: #7AAB8A; color: white; }
  .loc-btn.sel-amiens  { background: #3D5A80; border-color: #3D5A80; color: white; }
  .loc-btn.sel-lycee   { background: #3D5A80; border-color: #3D5A80; color: white; }
  .loc-btn.sel-autre   { background: #E07B54; border-color: #E07B54; color: white; }

  .sub-detail {
    display: none; gap: 6px; flex-wrap: wrap; margin-top: 4px;
    padding: 8px 10px; border-radius: 10px;
  }
  .sub-detail.visible { display: flex; }
  .sub-detail.green  { background: #F0F7F2; border-left: 3px solid #7AAB8A; flex-direction: column; }
  .sub-detail.orange { background: #FEF4EF; border-left: 3px solid #E07B54; flex-direction: column; }

  .sub-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .sub-btn {
    padding: 5px 12px; border-radius: 16px; border: 2px solid;
    background: white; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .sub-btn.green-theme { border-color: #7AAB8A; color: #3D6B4F; }
  .sub-btn.green-theme.selected { background: #3D6B4F; border-color: #3D6B4F; color: white; }
  .sub-btn.orange-theme { border-color: #E07B54; color: #C0582A; }
  .sub-btn.orange-theme.selected { background: #E07B54; border-color: #E07B54; color: white; }

  .free-input {
    flex: 1; min-width: 140px; padding: 5px 10px;
    border: 2px solid #E07B54; border-radius: 16px;
    font-size: 0.8rem; color: #2C3E35; outline: none;
    background: white;
  }
  .free-input:focus { border-color: #C0582A; }
  .free-input::placeholder { color: #bbb; }

  .sub-section-label {
    font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.4px; color: #888; margin-bottom: 2px;
  }

  /* Envoi */
  .send-section {
    max-width: 540px; margin: 22px auto 0; background: white;
    border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .send-section h2 { font-size: 0.9rem; font-weight: 600; color: #2C3E35; margin-bottom: 12px; }
  .send-btns { display: flex; flex-direction: column; gap: 8px; }
  .phone-input { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .phone-input input {
    flex: 1; padding: 9px 12px; border: 2px solid #D0DDD5; border-radius: 10px;
    font-size: 0.9rem; color: #2C3E35; outline: none; transition: border-color 0.15s;
  }
  .phone-input input:focus { border-color: #3D5A80; }
  .copy-btn {
    padding: 8px 12px; border-radius: 10px; border: 2px solid #D0DDD5;
    background: white; color: #4A6055; font-size: 1rem; cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { border-color: #3D5A80; }
  .copy-btn.copied { background: #7AAB8A; border-color: #7AAB8A; color: white; }
  .phone-hint { font-size: 0.72rem; color: #6B8070; margin-bottom: 10px; }

  .btn-whatsapp {
    width: 100%; padding: 13px; background: #25D366; color: white; border: none;
    border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s;
  }
  .btn-whatsapp:hover { background: #1ebe59; }
  .btn-sheets {
    width: 100%; padding: 13px; background: #34A853; color: white; border: none;
    border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s;
  }
  .btn-sheets:hover { background: #2d9148; }
  .btn-sheets:disabled { background: #9dcfaa; cursor: not-allowed; }
  .btn-reset {
    width: 100%; margin-top: 4px; padding: 9px; background: transparent;
    color: #6B8070; border: 1px solid #D0DDD5; border-radius: 10px; font-size: 0.85rem; cursor: pointer;
  }
  .status-msg {
    font-size: 0.82rem; text-align: center; padding: 8px;
    border-radius: 8px; display: none; margin-top: 6px;
  }
  .status-msg.ok  { background: #E8F7ED; color: #2d7a47; display: block; }
  .status-msg.err { background: #FEE8E8; color: #c0392b; display: block; }
</style>
</head>
<body>

<header>
  <h1>📅 Planning de la semaine</h1>
  <p>Indiquez où vous serez pour chaque repas</p>
</header>

<div class="author-section">
  <div class="author-label">Qui remplit ce planning ?</div>
  <div class="author-btns">
    <button class="author-btn" onclick="selectAuthor('Jeanne')">🧒 Jeanne</button>
    <button class="author-btn" onclick="selectAuthor('Louis')">🧒 Louis</button>
    <button class="author-btn" onclick="selectAuthor('Papa')">👨 Papa</button>
    <button class="author-btn" onclick="selectAuthor('Maman')">👩 Maman</button>
  </div>
</div>

<div class="week-nav">
  <button onclick="changeWeek(-1)">‹</button>
  <div class="week-label" id="weekLabel"></div>
  <button onclick="changeWeek(1)">›</button>
</div>

<div class="progress-label" id="progressLabel">0 / 14 repas renseignés</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="days-grid" id="daysGrid"></div>

<div class="send-section">
  <h2>📤 Envoyer le récapitulatif</h2>
  <div class="phone-input">
    <input type="tel" id="phoneInput" value="33679815801" />
    <button class="copy-btn" onclick="copyPhone()" id="copyBtn">📋</button>
  </div>
  <p class="phone-hint" id="copyHint">+33 6 79 81 58 01</p>
  <div class="send-btns">
    <button class="btn-whatsapp" onclick="sendWhatsApp()">💬 Envoyer sur WhatsApp</button>
    <button class="btn-sheets"   onclick="sendSheets()">📊 Envoyer vers Google Sheets</button>
    <button class="btn-reset"    onclick="resetAll()">🔄 Réinitialiser</button>
  </div>
  <div class="status-msg" id="statusMsg"></div>
</div>

<script>
const DAYS_FR   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const MEALS     = ['Midi','Soir'];

// URL du Apps Script déployé — à remplacer après déploiement
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxFg7TGb9K-uX5OX7EsfsLKASqPKZ0oVGozrbSKG7St5DBEeKKfZOHFAw20gNu1Tp3/exec';

// Profils
// who     : lieux qui déclenchent seul/à2
// gamelle : lieux qui déclenchent gamelle/sandwich/libre
const PROFILES = {
  Jeanne: { locs: ['Maison','Amiens','Autre'], who: ['Maison','Amiens','Autre'], gamelle: ['Autre'] },
  Louis:  { locs: ['Maison','Lycée','Autre'],  who: [],                          gamelle: ['Autre'] },
  Papa:   { locs: ['Maison','Lycée','Autre'],  who: [],                          gamelle: ['Autre'] },
  Maman:  { locs: ['Maison','Lycée','Autre'],  who: [],                          gamelle: ['Autre'] },
};

const WHO_OPTIONS     = ['Seule / Seul', 'À 2'];
const GAMELLE_OPTIONS = ['Gamelle froide', 'Sandwich'];

let weekOffset = 1;
let selections = {};
let author = '';

function profile() { return author ? PROFILES[author] : null; }

/* ── Auteur ── */
function selectAuthor(name) {
  author = name;
  document.querySelectorAll('.author-btn').forEach(b =>
    b.classList.toggle('selected', b.textContent.includes(name))
  );
  selections = {};
  render();
}

/* ── Semaine ── */
function getSundayOfWeek(offset) {
  const today = new Date();
  const sun = new Date(today);
  sun.setDate(today.getDate() + offset * 7 - today.getDay());
  sun.setHours(0,0,0,0);
  return sun;
}
function formatDate(d) { return `${d.getDate()} ${MONTHS_FR[d.getMonth()]}`; }
function changeWeek(dir) { weekOffset = Math.max(0, weekOffset + dir); render(); }

/* ── Clé ── */
function getKey(d, meal) { return `${weekOffset}_${d}_${meal}`; }

/* ── Sélections ── */
function selectLoc(d, meal, loc) {
  const k = getKey(d, meal);
  selections[k] = { loc };
  render();
}
function selectWho(d, meal, val) {
  const k = getKey(d, meal);
  if (!selections[k]) selections[k] = {};
  selections[k].who = val;
  render();
}
function selectGamelle(d, meal, val) {
  const k = getKey(d, meal);
  if (!selections[k]) selections[k] = {};
  // toggle
  selections[k].gamelle = selections[k].gamelle === val ? null : val;
  if (selections[k].gamelle) selections[k].libre = '';
  render();
}
function updateLibre(d, meal, val) {
  const k = getKey(d, meal);
  if (!selections[k]) selections[k] = {};
  selections[k].libre = val;
  if (val) selections[k].gamelle = null;
}

/* ── Progression ── */
function isFilled(sel, p) {
  if (!sel || !sel.loc) return false;
  if (p.who.includes(sel.loc) && !sel.who) return false;
  if (p.gamelle.includes(sel.loc) && !sel.gamelle && !sel.libre) return false;
  return true;
}
function countFilled() {
  if (!author) return 0;
  const p = profile();
  let n = 0;
  for (let d = 0; d < 7; d++)
    for (const meal of MEALS)
      if (isFilled(selections[getKey(d, meal)], p)) n++;
  return n;
}

/* ── Rendu ── */
function render() {
  const sun = getSundayOfWeek(weekOffset);
  const endSat = new Date(sun); endSat.setDate(sun.getDate() + 6);
  const isSameMonth = sun.getMonth() === endSat.getMonth();
  document.getElementById('weekLabel').textContent = isSameMonth
    ? `${sun.getDate()} – ${endSat.getDate()} ${MONTHS_FR[endSat.getMonth()]} ${endSat.getFullYear()}`
    : `${formatDate(sun)} – ${formatDate(endSat)} ${endSat.getFullYear()}`;

  const filled = countFilled();
  document.getElementById('progressLabel').textContent = `${filled} / 14 repas renseignés`;
  document.getElementById('progressFill').style.width = `${Math.round(filled/14*100)}%`;

  const p = profile();
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  for (let d = 0; d < 7; d++) {
    const date = new Date(sun); date.setDate(sun.getDate() + d);
    const card = document.createElement('div');
    card.className = 'day-card';
    let mealsHTML = '';

    for (let m = 0; m < MEALS.length; m++) {
      const meal = MEALS[m];
      const k = getKey(d, meal);
      const sel = selections[k] || {};

      // Boutons lieux
      let locBtns = '';
      if (p) {
        locBtns = p.locs.map(loc => {
          const slug = loc.toLowerCase().replace(/é/g,'e');
          const active = sel.loc === loc ? `sel-${slug}` : '';
          return `<button class="loc-btn ${active}" onclick="selectLoc(${d},'${meal}','${loc}')">${loc}</button>`;
        }).join('');
      } else {
        locBtns = `<span style="font-size:0.8rem;color:#aaa;font-style:italic">Choisissez un auteur d'abord</span>`;
      }

      // Sous-menu Seul/À2 (vert)
      let whoHTML = '';
      if (p && sel.loc && p.who.includes(sel.loc)) {
        const btns = WHO_OPTIONS.map(w =>
          `<button class="sub-btn green-theme ${sel.who===w?'selected':''}" onclick="selectWho(${d},'${meal}','${w}')">${w==='Seule / Seul'?'👤 ':'👥 '}${w}</button>`
        ).join('');
        whoHTML = `<div class="sub-detail green visible"><div class="sub-row">${btns}</div></div>`;
      }

      // Sous-menu Gamelle (orange)
      let gamelleHTML = '';
      if (p && sel.loc && p.gamelle.includes(sel.loc)) {
        const gBtns = GAMELLE_OPTIONS.map(g => {
          const icons = {'Gamelle froide':'🍱','Sandwich':'🥪'};
          return `<button class="sub-btn orange-theme ${sel.gamelle===g?'selected':''}" onclick="selectGamelle(${d},'${meal}','${g}')">${icons[g]} ${g}</button>`;
        }).join('');
        const libreVal = sel.libre || '';
        gamelleHTML = `
          <div class="sub-detail orange visible">
            <div class="sub-section-label">Repas prévu</div>
            <div class="sub-row">
              ${gBtns}
            </div>
            <div class="sub-row" style="margin-top:4px">
              <input class="free-input" type="text" placeholder="✏️ Autre (saisie libre)…"
                value="${libreVal}"
                oninput="updateLibre(${d},'${meal}',this.value)"
                onfocus="selectGamelle(${d},'${meal}',null)"
              />
            </div>
          </div>`;
      }

      mealsHTML += `
        ${m > 0 ? '<div class="divider"></div>' : ''}
        <div class="meal-row">
          <div class="meal-label">${meal==='Midi'?'🌞 Midi':'🌙 Soir'}</div>
          <div class="location-btns">${locBtns}</div>
          ${whoHTML}
          ${gamelleHTML}
        </div>`;
    }

    card.innerHTML = `
      <div class="day-header">
        ${DAYS_FR[date.getDay()]}
        <span class="day-date">${formatDate(date)}</span>
      </div>
      <div class="meals">${mealsHTML}</div>`;
    grid.appendChild(card);
  }
}

/* ── Construire le récap texte ── */
function buildMessage() {
  const p = profile();
  const sun = getSundayOfWeek(weekOffset);
  const endSat = new Date(sun); endSat.setDate(sun.getDate() + 6);
  let msg = `📅 Planning de ${author} – semaine du ${formatDate(sun)} au ${formatDate(endSat)}\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━━\n`;
  for (let d = 0; d < 7; d++) {
    const date = new Date(sun); date.setDate(sun.getDate() + d);
    msg += `\n*${DAYS_FR[date.getDay()]} ${date.getDate()}/${date.getMonth()+1}*\n`;
    for (const meal of MEALS) {
      const sel = selections[getKey(d, meal)] || {};
      const icon = meal === 'Midi' ? '🌞' : '🌙';
      let detail = sel.loc || '—';
      if (sel.loc) {
        const extras = [];
        if (p.who.includes(sel.loc) && sel.who) extras.push(sel.who);
        const repas = sel.gamelle || sel.libre;
        if (p.gamelle.includes(sel.loc) && repas) extras.push(repas);
        if (extras.length) detail += ` (${extras.join(', ')})`;
      }
      msg += `  ${icon} ${meal} : ${detail}\n`;
    }
  }
  return msg.trim();
}

/* ── WhatsApp ── */
function sendWhatsApp() {
  if (!author) { alert('Merci de choisir qui remplit ce planning.'); return; }
  const phone = document.getElementById('phoneInput').value.trim().replace(/\D/g,'');
  if (!phone) { alert('Merci de saisir un numéro WhatsApp.'); return; }
  const confirmMsg = `✅ Le planning repas de la semaine a été saisi par ${author}.`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(confirmMsg)}`, '_blank');
}

/* ── Google Sheets ── */
function buildSheetsPayload() {
  const p = profile();
  const sun = getSundayOfWeek(weekOffset);
  const endSat = new Date(sun); endSat.setDate(sun.getDate() + 6);
  const auteurSheets = author === 'Papa' ? 'Hervé' : author;
  const semaineLabel = `${sun.getDate()}/${sun.getMonth()+1} – ${endSat.getDate()}/${endSat.getMonth()+1} ${endSat.getFullYear()}`;
  const rows = [];
  for (let d = 0; d < 7; d++) {
    const date = new Date(sun); date.setDate(sun.getDate() + d);
    const dateStr = `${DAYS_FR[date.getDay()].toLowerCase()} ${date.getDate()}/${String(date.getMonth()+1).padStart(2,'0')}`;
    for (const meal of MEALS) {
      const sel = selections[getKey(d, meal)] || {};
      const repas = sel.gamelle || sel.libre || '';
      rows.push({
        auteur:   auteurSheets,
        semaine:  semaineLabel,
        date:     dateStr,
        jour:     DAYS_FR[date.getDay()],
        repas:    meal,
        lieu:     sel.loc || '',
        qui:      sel.who || '',
        gamelle:  repas
      });
    }
  }
  return rows;
}

function sendSheets() {
  if (!author) { alert('Merci de choisir qui remplit ce planning.'); return; }
  const btn = document.querySelector('.btn-sheets');
  const statusEl = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.textContent = '⏳ Envoi en cours…';
  statusEl.className = 'status-msg';

  const rows = buildSheetsPayload();
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'payload=' + encodeURIComponent(JSON.stringify(rows))
  })
  .then(() => {
    statusEl.className = 'status-msg ok';
    statusEl.textContent = '✅ Planning envoyé dans Google Sheets !';
  })
  .catch(e => {
    statusEl.className = 'status-msg err';
    statusEl.textContent = '❌ Erreur : ' + e.message;
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = '📊 Envoyer vers Google Sheets';
  });
}

/* ── Copier numéro ── */
function copyPhone() {
  const val = document.getElementById('phoneInput').value;
  navigator.clipboard.writeText('+' + val).then(() => {
    const btn = document.getElementById('copyBtn');
    const hint = document.getElementById('copyHint');
    btn.classList.add('copied'); btn.textContent = '✅';
    hint.textContent = 'Numéro copié !';
    setTimeout(() => {
      btn.classList.remove('copied'); btn.textContent = '📋';
      hint.textContent = '+33 6 79 81 58 01';
    }, 2000);
  });
}

/* ── Reset ── */
function resetAll() {
  if (confirm('Réinitialiser toutes les sélections ?')) {
    selections = {}; author = '';
    document.querySelectorAll('.author-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('statusMsg').className = 'status-msg';
    render();
  }
}

render();
</script>
</body>
</html>
